<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Happy Birthday Swathi</title>
<style>
body{margin:0;font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);overflow:hidden;color:white;text-align:center}
.screen{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px}
.active{display:flex}
button{padding:14px 28px;border:none;border-radius:30px;font-size:18px;cursor:pointer}
h1{text-shadow:0 0 20px white}
#cake{font-size:180px;animation:bounce 1.5s infinite}
@keyframes bounce{50%{transform:translateY(-20px)}}
.float{position:absolute;animation:rise linear infinite}
@keyframes rise{from{transform:translateY(110vh)}to{transform:translateY(-150px)}}
.letter{max-width:800px;background:rgba(255,255,255,.15);padding:20px;border-radius:20px}
</style>
</head>
<body>

<div id='welcome' class='screen active'>
<h1>🎉 Happy Birthday Swathi 🎉</h1>
<p>Special Surprise Awaits</p>
<button onclick="showScreen('cakeScreen')">Start ➜</button>
</div>

<div id='cakeScreen' class='screen'>
<div id='cake'>🎂</div>
<button onclick='celebrate()'>🔪 Cut Cake</button>
</div>

<div id='celebrateScreen' class='screen'>
<h1>❤️ HAPPY BIRTHDAY SWATHI ❤️</h1>
<button onclick='showLetter()'>💌 Read Letter</button>
</div>

<div id='letterScreen' class='screen'>
<div class='letter'>
<h2>Dear Swathi ❤️</h2>
<p id='typed'></p>
</div>
<button onclick='location.reload()'>🔄 Restart</button>
</div>

<script>
function showScreen(id){
document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function celebrate(){
showScreen('celebrateScreen');
for(let i=0;i<250;i++){
let e=document.createElement('div');
e.className='float';
e.innerHTML=Math.random()>.5?'🎊':'🎈';
e.style.left=Math.random()*100+'vw';
e.style.fontSize=(15+Math.random()*35)+'px';
e.style.animationDuration=(3+Math.random()*6)+'s';
document.body.appendChild(e);
}
}

for(let i=0;i<60;i++){
let e=document.createElement('div');
e.className='float';
e.innerHTML=Math.random()>.5?'❤️':'🌸';
e.style.left=Math.random()*100+'vw';
e.style.fontSize=(20+Math.random()*20)+'px';
e.style.animationDuration=(5+Math.random()*10)+'s';
document.body.appendChild(e);
}

function showLetter(){
showScreen('letterScreen');
const text=`Happy Birthday Swathi!

I hope your day is filled with happiness, laughter and beautiful memories.
May all your dreams come true.

With best wishes,
David ❤️`;

let i=0;
const box=document.getElementById('typed');
const t=setInterval(()=>{
box.textContent+=text.charAt(i);
i++;
if(i>=text.length) clearInterval(t);
},35);
}
</script>
</body>
</html>
